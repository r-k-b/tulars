version: 2
updates:
- package-ecosystem: elm
  cooldown:
    default-days: 10
  directories:
    - "/"
    - "/review"
  schedule:
    interval: daily
    time: "19:00"
  open-pull-requests-limit: 10
  reviewers:
  - r-k-b
- package-ecosystem: github-actions
  cooldown:
    default-days: 10
  directories:
    - "/.github"
    - "/.github/workflows"
  schedule:
    interval: daily
    time: "19:00"
  open-pull-requests-limit: 10
  reviewers:
  - r-k-b
